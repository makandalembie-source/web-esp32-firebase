<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Contrôle Lampe - ESP32</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f1829 0%, #1a2a4a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: linear-gradient(135deg, #0f1829 0%, #1a2a4a 100%);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 16px 20px;
            overflow-y: auto;
        }

        .status-top {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            z-index: 10;
            margin: 6px 0 8px 0;
            position: relative;
            top: auto;
            left: auto;
            width: auto;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            display: inline-block;
        }

        .status-indicator.offline {
            background: #ff4444;
            box-shadow: 0 0 10px #ff4444;
        }

        .status-indicator.online {
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 44px;
            color: #ffc107;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 0px;
            line-height: 1;
        }

        .header p {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
            margin-top: 2px;
        }

        .datetime-display {
            color: #ffc107;
            font-size: 15px;
            margin-top: 12px;
            padding: 11px 22px;
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.08) 0%, rgba(255, 193, 7, 0.05) 100%);
            border-radius: 10px;
            border: 2px solid rgba(255, 193, 7, 0.4);
            width: 100%;
            max-width: 380px;
            display: block;
            white-space: nowrap;
            font-weight: 600;
            text-align: center;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .datetime-display:hover {
            background: linear-gradient(135deg, rgba(255, 193, 7, 0.12) 0%, rgba(255, 193, 7, 0.08) 100%);
            border-color: rgba(255, 193, 7, 0.6);
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 380px;
            flex: 1;
            justify-content: space-between;
            min-height: 0;
        }

        .connect-btn {
            width: 100%;
            max-width: 380px;
            background: linear-gradient(135deg, #4a7c9f 0%, #357ba5 100%);
            color: white;
            border: 2px solid #357ba5;
            padding: 11px 22px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .connect-btn:hover {
            background: linear-gradient(135deg, #5a8caf 0%, #4a8bb5 100%);
            transform: translateY(-2px);
        }

        .lamp-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 8px 0;
            width: 250px;
            height: 220px;
            flex: 1;
            min-height: 0;
        }

        .lamp-bulb {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lamp-bulb svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 15px rgba(255, 219, 0, 0.1));
            transition: filter 0.3s ease;
        }

        .lamp-bulb.active svg {
            filter: drop-shadow(0 0 20px rgba(255, 255, 0, 1)) drop-shadow(0 0 40px rgba(255, 219, 0, 0.9)) drop-shadow(0 0 70px rgba(255, 200, 0, 0.8)) drop-shadow(0 0 100px rgba(255, 193, 7, 0.6)) drop-shadow(0 0 150px rgba(255, 180, 0, 0.4)) drop-shadow(0 0 200px rgba(255, 150, 0, 0.2));
        }

        .control-buttons {
            display: flex;
            gap: 12px;
            width: 100%;
            justify-content: center;
            flex-shrink: 0;
            margin-bottom: 6px;
            box-sizing: border-box;
        }

        .control-btn {
            flex: 1;
            padding: 11px 22px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.3s;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-btn.on {
            background: linear-gradient(135deg, #2d5f1f 0%, #3a7c2a 100%);
            border: 2px solid #3a7c2a;
        }

        .control-btn.on:hover {
            background: linear-gradient(135deg, #3d7f2f 0%, #4a9c3a 100%);
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(58, 124, 42, 0.4);
        }

        .control-btn.off {
            background: linear-gradient(135deg, #7f2f2f 0%, #a5363d 100%);
            border: 2px solid #a5363d;
        }

        .control-btn.off:hover {
            background: linear-gradient(135deg, #8f3f3f 0%, #b5464d 100%);
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(165, 54, 61, 0.4);
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .control-btn:disabled:hover {
            box-shadow: none !important;
        }

        .voice-btn {
            width: 100%;
            max-width: 380px;
            background: linear-gradient(135deg, #4a6c9f 0%, #355a85 100%);
            color: white;
            border: 2px solid #355a85;
            padding: 11px 22px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-shrink: 0;
            margin-bottom: 8px;
        }

        .voice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .voice-btn:disabled:hover {
            transform: none !important;
        }

        .brightness-control {
            width: 100%;
            max-width: 380px;
            margin-top: 8px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            display: none;
            color: white;
            flex-shrink: 0;
        }

        .brightness-control label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
        }

        input[type="range"] {
            width: 100%;
            margin: 8px 0;
            -webkit-appearance: none;
            appearance: none;
            background: #ddd;
            height: 5px;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffc107;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffc107;
            cursor: pointer;
            border: none;
        }

        .info-panel {
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 16px;
            margin-top: 8px;
            display: none;
            color: white;
            flex-shrink: 0;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 11px;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: bold;
            color: #ccc;
        }

        .info-value {
            color: #ffc107;
            font-family: monospace;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: fadeInOut 3s ease;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        .demo-section {
            width: 100%;
            max-width: 380px;
            background: rgba(60, 40, 20, 0.4);
            border: 2px solid #cc8833;
            border-radius: 20px;
            padding: 24px 32px;
            margin-top: 20px;
            text-align: center;
            color: #ccc;
            font-size: 16px;
            line-height: 1.6;
            flex-shrink: 0;
        }

        .demo-section h3 {
            color: #ffc107;
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .main-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-wrap">
            <div class="header">
                <h1>Contrôle<br>Lampe</h1>
                <p>ESP32 – Mode Démo</p>
                <div class="status-top">
                    <span class="status-indicator offline" id="statusIndicator"></span>
                    <span id="statusText">HORS LIGNE</span>
                </div>
                <div class="datetime-display" id="dateTimeDisplay">
                    Chargement...
                </div>
            </div>

            <div class="content">
            <button class="connect-btn" onclick="connectButtonClick()">
                <span>📡</span>
                <span id="connectBtnText">Se Connecter</span>
            </button>

            <div class="lamp-container">
                <div class="lamp-bulb" id="lampBulb">
                    <svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <radialGradient id="incanYellow" cx="40%" cy="40%">
                                <stop offset="0%" style="stop-color:#FFFF00;stop-opacity:1" />
                                <stop offset="50%" style="stop-color:#FFFF00;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#FFC700;stop-opacity:0.95" />
                            </radialGradient>
                            <filter id="yellowGlow">
                                <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                                <feMerge>
                                    <feMergeNode in="coloredBlur"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                        </defs>
                        <!-- Ampoule poire jaune vif incandescence -->
                        <path d="M 32 22 Q 28 35, 30 50 Q 32 58, 50 62 Q 68 58, 70 50 Q 72 35, 68 22 Q 68 15, 50 12 Q 32 15, 32 22" 
                              fill="url(#incanYellow)" stroke="#B8860B" stroke-width="2.5"/>
                        
                        <!-- Reflet brillant blanc en haut à gauche -->
                        <ellipse cx="38" cy="20" rx="12" ry="16" fill="#FFFFFF" opacity="0.8"/>
                        
                        <!-- Reflet secondaire -->
                        <ellipse cx="65" cy="48" rx="6" ry="8" fill="#FFFACD" opacity="0.6"/>
                        
                        <!-- Filament incandescent spiralé (rouge-orangé) -->
                        <path d="M 45 32 Q 47 40, 50 34 Q 53 28, 55 34 Q 53 40, 50 38 Q 47 36, 45 42" 
                              stroke="#FF6B35" stroke-width="2.8" fill="none" filter="url(#yellowGlow)" stroke-linecap="round" stroke-linejoin="round"/>
                        
                        <!-- Support du filament vers bas -->
                        <path d="M 48 42 Q 50 48, 52 42" 
                              stroke="#FF6B35" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                        
                        <!-- Tige de connexion interne (marron clair) -->
                        <line x1="50" y1="45" x2="50" y2="60" stroke="#8B6F47" stroke-width="2"/>
                        
                        <!-- Transition culot-ampoule -->
                        <ellipse cx="50" cy="62" rx="20" ry="4" fill="#999999" stroke="#666666" stroke-width="1.5" opacity="0.7"/>
                        
                        <!-- Culot métallisé moderne (gris-argent) -->
                        <rect x="40" y="64" width="20" height="18" fill="#B0B0B0" stroke="#707070" stroke-width="2" rx="2"/>
                        
                        <!-- Rainures du culot (style moderne) -->
                        <line x1="40" y1="70" x2="60" y2="70" stroke="#707070" stroke-width="1.2"/>
                        <line x1="40" y1="76" x2="60" y2="76" stroke="#707070" stroke-width="1.2"/>
                        
                        <!-- Zone de contact finale (doré) -->
                        <rect x="44" y="82" width="12" height="8" fill="#D4A574" stroke="#B8860B" stroke-width="1.5" rx="1"/>
                        
                        <!-- Contact central -->
                        <circle cx="50" cy="92" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
                    </svg>
                </div>
            </div>

            <div class="control-buttons">
                <button class="control-btn on" id="btnAllumer" onclick="sendLampCommand(true)">Allumer</button>
                <button class="control-btn off" id="btnEteindre" onclick="sendLampCommand(false)">Éteindre</button>
            </div>

            <button class="voice-btn" id="btnVoice" onclick="voiceCommand()">
                <span>🎤</span>
                <span>Commande Vocale</span>
            </button>

            <button class="voice-btn" id="btnStopVoice" onclick="stopVoiceCommand()" style="display: none; background: linear-gradient(135deg, #a53d3d 0%, #8f3f3f 100%); border-color: #8f3f3f;">
                <span>⏹️</span>
                <span>Annuler</span>
            </button>

            <div class="brightness-control">
                <label>Luminosité (PWM):</label>
                <input type="range" id="brightnessSlider" min="0" max="255" value="0" onchange="sendBrightnessCommand(this.value)">
                <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                    <span>Éteint</span>
                    <span id="brightnessValue">0%</span>
                    <span>Maximum</span>
                </div>
            </div>

            <div class="info-panel">
                <h3 style="margin-bottom: 12px; text-align: center; font-size: 13px;">📊 Informations système</h3>
                <div class="info-item">
                    <span class="info-label">État ESP32:</span>
                    <span class="info-value" id="espStatus">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Signal WiFi:</span>
                    <span class="info-value" id="wifiSignal">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Adresse IP:</span>
                    <span class="info-value" id="ipAddress">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Uptime:</span>
                    <span class="info-value" id="uptime">-</span>
                </div>
            </div>
            </div>

            <div class="demo-section">
                <h3>Mode Démo :</h3>
                <p>Dites <span style="color: #ffc107; font-weight: bold;">"Allumer"</span> ou <span style="color: #ffc107; font-weight: bold;">"Éteindre"</span> pour contrôler la lampe par la voix.</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD2_belg3t78AxvY-cgDVnCAR_lY-3Vocc",
            authDomain: "esp32firebaselamp.firebaseapp.com",
            databaseURL: "https://esp32firebaselamp-default-rtdb.firebaseio.com",
            projectId: "esp32firebaselamp",
            storageBucket: "esp32firebaselamp.firebasestorage.app",
            messagingSenderId: "315120600984",
            appId: "1:315120600984:web:4c9a632091349e7b8e8ded"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

       const commandsRef = database.ref('commandes');
       const lampeRef = database.ref('Lampe');  // Ajouté pour correspondre à votre base
       const statusRef = database.ref('statuts');
       const systemRef = database.ref('systeme');

        let isConnected = false;
        let lampState = false;
        let isVoiceCommandActive = false;
        let recognition = null;

        function updateClock() {
            const now = new Date();
            const days = ['dimanche', 'lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi'];
            const months = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];
            
            const day = days[now.getDay()];
            const date = now.getDate();
            const month = months[now.getMonth()];
            const year = now.getFullYear();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const dateTimeStr = `${day.charAt(0).toUpperCase() + day.slice(1)} ${date} ${month} ${year} - ${hours}:${minutes}:${seconds}`;
            document.getElementById('dateTimeDisplay').textContent = dateTimeStr;
        }

        setInterval(updateClock, 1000);
        updateClock();

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.background = isError ? '#e74c3c' : '#27ae60';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function connectButtonClick() {
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');

            if (!isConnected) {
                isConnected = true;
                indicator.classList.remove('offline');
                indicator.classList.add('online');
                statusText.textContent = 'CONNECTÉ';
                document.getElementById('connectBtnText').textContent = 'Déconnecter';
                speak('système activé');
                showToast('Connecté à Firebase ✅');
            } else {
                isConnected = false;
                indicator.classList.remove('online');
                indicator.classList.add('offline');
                statusText.textContent = 'HORS LIGNE';
                document.getElementById('connectBtnText').textContent = 'Se Connecter';
                lampState = false;
                updateLampUI();
                speak('système désactivé');
                showToast('Déconnecté de Firebase');
            }
        }

      async function sendLampCommand(value) {
    if (!isConnected) {
        showToast('Veuillez d\'abord vous connecter', true);
        return;
    }
    
    try {
        lampState = value;
        updateLampUI();
        // Envoyer à la fois à commandes/lampe ET à Lampe (pour compatibilité)
        await commandsRef.update({ lampe: value });
        await lampeRef.set(value);  // <- NOUVEAU : écrit directement dans /Lampe
        speak(value ? 'lampe allumer' : 'lampe éteinte');
        
        // Ajouter dans l'historique
        const historiqueRef = database.ref('historique');
        await historiqueRef.push({
            action: value ? 'ALLUMER' : 'ÉTEINDRE',
            source: 'Interface Web',
            timestamp: new Date().toISOString()
        });
        
        showToast(`Lampe ${value ? 'allumée' : 'éteinte'} ✅`);
    } catch (error) {
        console.error('Erreur:', error);
        showToast('Erreur lors de l\'envoi de la commande', true);
        lampState = !value;
        updateLampUI();
    }
}

        function updateLampUI() {
            const lampBulb = document.getElementById('lampBulb');
            if (lampState) {
                lampBulb.classList.add('active');
            } else {
                lampBulb.classList.remove('active');
            }
        }

        function voiceCommand() {
            if (!isConnected) {
                showToast('Veuillez d\'abord vous connecter', true);
                return;
            }
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                showToast('Reconnaissance vocale non supportée', true);
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';

            isVoiceCommandActive = true;
            document.getElementById('btnAllumer').disabled = true;
            document.getElementById('btnEteindre').disabled = true;
            document.getElementById('btnVoice').disabled = true;
            document.getElementById('btnStopVoice').style.display = 'flex';
            speak('commande vocale activée');
            showToast('En écoute...');

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase();
                console.log('Texte détecté:', transcript);

                if (transcript.includes('allum') || transcript.includes('on')) {
                    sendLampCommand(true);
                    speak('lampe allumer');
                } else if (transcript.includes('éteind') || transcript.includes('off')) {
                    sendLampCommand(false);
                    speak('lampe éteinte');
                } else {
                    showToast('Commande non reconnue');
                }
                
                isVoiceCommandActive = false;
                document.getElementById('btnAllumer').disabled = false;
                document.getElementById('btnEteindre').disabled = false;
                document.getElementById('btnVoice').disabled = false;
                document.getElementById('btnStopVoice').style.display = 'none';
                speak('commande vocale désactivée');
            };

            recognition.onerror = (event) => {
                showToast('Erreur de reconnaissance: ' + event.error, true);
                isVoiceCommandActive = false;
                document.getElementById('btnAllumer').disabled = false;
                document.getElementById('btnEteindre').disabled = false;
                document.getElementById('btnVoice').disabled = false;
                document.getElementById('btnStopVoice').style.display = 'none';
                speak('commande vocale désactivée');
            };

            recognition.start();
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'fr-FR';
            utterance.rate = 1;
            utterance.pitch = 1;
            utterance.volume = 1;
            window.speechSynthesis.speak(utterance);
        }

        function stopVoiceCommand() {
            if (recognition) {
                recognition.stop();
            }
            
            isVoiceCommandActive = false;
            document.getElementById('btnAllumer').disabled = false;
            document.getElementById('btnEteindre').disabled = false;
            document.getElementById('btnVoice').disabled = false;
            document.getElementById('btnStopVoice').style.display = 'none';
            speak('commande vocale d\u00e9sactiv\u00e9e');
            showToast('Commande vocale annulée');
        }

        async function sendBrightnessCommand(value) {
            if (!isConnected) {
                return;
            }
            
            try {
                await commandsRef.update({ brightness: parseInt(value) });
                const percent = Math.round((value / 255) * 100);
                document.getElementById('brightnessValue').textContent = `${percent}%`;
            } catch (error) {
                console.error('Erreur:', error);
                showToast('Erreur lors de l\'envoi de la commande', true);
            }
        }

       function updateUI(snapshot) {
    const data = snapshot.val();
    if (data) {
        if (data.lampe !== undefined) {
            lampState = data.lampe;
            updateLampUI();
        }
        
        if (data.brightness !== undefined) {
            document.getElementById('brightnessSlider').value = data.brightness;
            const percent = Math.round((data.brightness / 255) * 100);
            document.getElementById('brightnessValue').textContent = `${percent}%`;
        }
    }
}

// NOUVEAU : écouter directement /Lampe
lampeRef.on('value', (snapshot) => {
    const etat = snapshot.val();
    if (etat !== null && etat !== undefined) {
        lampState = etat === true;
        updateLampUI();
        console.log('État Lampe depuis Firebase:', lampState);
    }
});

        function updateSystemInfo(snapshot) {
            const data = snapshot.val();
            if (data) {
                if (data.etat_connexion) {
                    document.getElementById('espStatus').innerHTML = '✅ Connecté';
                } else {
                    document.getElementById('espStatus').innerHTML = '❌ Déconnecté';
                }
                
                if (data.rssi !== undefined) {
                    const rssi = data.rssi;
                    document.getElementById('wifiSignal').innerHTML = `${rssi} dBm`;
                }
                
                if (data.ip) {
                    document.getElementById('ipAddress').innerHTML = data.ip;
                }
                
                if (data.uptime !== undefined) {
                    const hours = Math.floor(data.uptime / 3600);
                    const minutes = Math.floor((data.uptime % 3600) / 60);
                    const seconds = data.uptime % 60;
                    document.getElementById('uptime').innerHTML = `${hours}h ${minutes}m ${seconds}s`;
                }
            }
        }

        statusRef.on('value', updateUI);
        systemRef.on('value', updateSystemInfo);
    </script>
</body>
